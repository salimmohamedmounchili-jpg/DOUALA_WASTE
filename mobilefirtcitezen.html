<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citoyen - Signalement Douala Waste</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --citizen-purple: #bc13fe;
            --bg: #05070a;
            --card-bg: #0f172a;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--citizen-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-family: 'Orbitron';
            color: var(--citizen-purple);
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            box-sizing: border-box;
            font-family: 'Rajdhani';
            font-size: 1rem;
        }

        /* Style spécifique pour le bouton photo */
        .photo-btn-wrapper {
            background: rgba(188, 19, 254, 0.1);
            border: 1px dashed var(--citizen-purple);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .photo-btn-wrapper:hover { background: rgba(188, 19, 254, 0.2); }

        #photoPreview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
            border: 1px solid var(--citizen-purple);
        }

        button#sendBtn {
            width: 100%;
            padding: 15px;
            background: var(--citizen-purple);
            color: white;
            border: none;
            border-radius: 5px;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button#sendBtn:disabled { background: #444; cursor: not-allowed; }

        .success-msg {
            display: none;
            color: #39ff14;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            padding: 10px;
            border: 1px solid #39ff14;
            border-radius: 5px;
            background: rgba(57, 255, 20, 0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📢 SIGNALEMENT CITOYEN</h1>
    
    <div class="form-group">
        <label>Votre Nom</label>
        <input type="text" id="citName" placeholder="Ex: Paul Atangana">
    </div>

    <div class="form-group">
        <label>Quartier de Douala</label>
        <select id="citQuartier">
            <option value="Akwa">Akwa</option>
            <option value="New Bell">New Bell</option>
            <option value="Deido">Deido</option>
            <option value="Bonabéri">Bonabéri</option>
            <option value="Ndokoti">Ndokoti</option>
            <option value="Logpom">Logpom</option>
            <option value="Village">Village</option>
        </select>
    </div>

    <div class="form-group">
        <label>Localisation précise</label>
        <input type="text" id="citLoc" placeholder="Ex: Face Marché Central">
    </div>

    <div class="form-group">
        <label>Type de problème</label>
        <select id="citLvl">
            <option value="Poubelle qui déborde">Poubelle qui déborde</option>
            <option value="Dépôt sauvage">Dépôt sauvage d'ordures</option>
            <option value="Caniveau bouché">Caniveau bouché (Déchets)</option>
        </select>
    </div>

    <div class="form-group">
        <label>📸 PREUVE VISUELLE (OBLIGATOIRE)</label>
        <div class="photo-btn-wrapper" onclick="document.getElementById('citPhoto').click()">
            <span id="photoStatusText">📷 CLIQUEZ POUR FILMER</span>
            <input type="file" id="citPhoto" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">
            <img id="photoPreview">
        </div>
    </div>

    <button id="sendBtn" onclick="sendToDashboard()">ENVOYER L'ALERTE</button>
    <div id="success" class="success-msg">✓ Alerte envoyée ! Merci pour votre civisme.</div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://douala-clean-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db_online = firebase.database();

    let compressedImageBase64 = null;

    // Fonction pour gérer la photo et afficher un aperçu
    async function handleFile(input) {
        const file = input.files[0];
        if (!file) return;

        document.getElementById("photoStatusText").innerText = "⌛ Traitement de l'image...";
        
        // Compression de l'image (Canvas)
        compressedImageBase64 = await compressImage(file);
        
        // Affichage de l'aperçu
        const preview = document.getElementById("photoPreview");
        preview.src = compressedImageBase64;
        preview.style.display = "block";
        document.getElementById("photoStatusText").innerText = "✅ Image prête";
    }

    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500; // Taille optimale pour Firebase
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); // Qualité 70%
                };
            };
        });
    }

    async function sendToDashboard() {
        const name = document.getElementById("citName").value;
        const loc = document.getElementById("citLoc").value;
        const q = document.getElementById("citQuartier").value;
        const type = document.getElementById("citLvl").value;
        const btn = document.getElementById("sendBtn");

        if(!name || !loc || !compressedImageBase64) {
            alert("Veuillez remplir tous les champs et prendre une photo.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "TRANSMISSION CLOUD...";

        const reportId = Date.now();
        const newReport = {
            id: reportId,
            name: name,
            loc: loc,
            q: q,
            type: type,
            photo: compressedImageBase64, // Image compressée incluse
            time: new Date().toLocaleTimeString('fr-FR'),
            status: "En attente"
        };

        db_online.ref('reports/' + reportId).set(newReport)
        .then(() => {
            document.getElementById("success").style.display = "block";
            
            // Reset Formulaire
            document.getElementById("citName").value = "";
            document.getElementById("citLoc").value = "";
            document.getElementById("photoPreview").style.display = "none";
            document.getElementById("photoStatusText").innerText = "📷 CLIQUEZ POUR FILMER";
            compressedImageBase64 = null;

            btn.disabled = false;
            btn.innerText = "ENVOYER L'ALERTE";

            setTimeout(() => {
                document.getElementById("success").style.display = "none";
            }, 5000);
        })
        .catch((error) => {
            alert("Erreur réseau : " + error.message);
            btn.disabled = false;
            btn.innerText = "RÉESSAYER";
        });
    }
</script>

</body>
</html>
