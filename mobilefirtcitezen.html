<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citoyen - Signalement Douala Waste</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --citizen-purple: #bc13fe;
            --bg: #05070a;
            --card-bg: #0f172a;
            --blue: #00d2ff;
            --green: #39ff14;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--citizen-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }

        h1 { font-family: 'Orbitron'; color: var(--citizen-purple); font-size: 1.3rem; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #334155; 
            background: #1e293b; color: white; box-sizing: border-box; font-family: 'Rajdhani'; font-size: 1rem;
        }

        textarea { resize: none; }

        .photo-btn-wrapper {
            background: rgba(188, 19, 254, 0.1); border: 1px dashed var(--citizen-purple);
            padding: 15px; border-radius: 5px; text-align: center; cursor: pointer;
        }

        #galleryPreview { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-top: 10px; 
        }
        .img-thumb { 
            width: 100%; height: 80px; object-fit: cover; border-radius: 5px; 
            border: 1px solid var(--citizen-purple); 
        }
        .thumb-container { position: relative; }
        .remove-badge {
            position: absolute; top: -5px; right: -5px; background: red; color: white;
            border-radius: 50%; width: 18px; height: 18px; font-size: 12px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        button#sendBtn {
            width: 100%; padding: 15px; background: var(--citizen-purple); color: white; border: none;
            border-radius: 5px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button#sendBtn:disabled { background: #444; cursor: not-allowed; }

        .tracking-section {
            background: rgba(0, 0, 0, 0.4);
            border-top: 2px solid var(--citizen-purple);
            padding: 20px;
            width: 100%;
            max-width: 450px;
            border-radius: 0 0 15px 15px;
        }

        .track-item {
            background: #1e293b;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            border-left: 4px solid var(--citizen-purple);
            font-size: 0.9rem;
        }

        .status-pill {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .status-en-attente { background: #444; color: #aaa; }
        .status-vu { background: rgba(0, 210, 255, 0.2); color: var(--blue); border: 1px solid var(--blue); }
        .status-traite { background: rgba(57, 255, 20, 0.2); color: var(--green); border: 1px solid var(--green); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .success-msg { display: none; color: var(--green); text-align: center; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📢 SIGNALEMENT CITOYEN</h1>
    
    <div class="form-group">
        <label>Votre Nom complet</label>
        <input type="text" id="citName" placeholder="Ex: Salim Mohamed ">
    </div>

    <div class="form-group">
        <label>Numéro de Téléphone (9 chiffres)</label>
        <input type="tel" id="citPhone" placeholder="Ex: +237 6xx xx xx xx" maxlength="9" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    </div>

    <div class="form-group">
        <label>Quartier de Douala</label>
        <input list="quartiers-list" id="citQuartier" placeholder="Tapez le nom du quartier...">
        <datalist id="quartiers-list"></datalist>
    </div>

    <div class="form-group">
        <label>Localisation précise</label>
        <input type="text" id="citLoc" placeholder="Ex: Face immeuble bleu">
    </div>

    <div class="form-group">
        <label>Type de problème</label>
        <select id="issueType">
            <option value="" disabled selected>Choisir une catégorie...</option>
            <option value="Poubelle déborde">🗑️ Poubelle déborde</option>
            <option value="Dépôt sauvage d'ordures">⚠️ Dépôt sauvage d'ordures</option>
            <option value="Caniveau bouché">🌊 Caniveau bouché</option>
        </select>
    </div>

    <div class="form-group">
        <label>Description de la situation</label>
        <textarea id="citDesc" rows="3" placeholder="Décrivez le problème librement..."></textarea>
    </div>

    <div class="form-group">
        <label>📸 PHOTOS DU PROBLÈME</label>
        <div class="photo-btn-wrapper" onclick="document.getElementById('citPhoto').click()">
            <span id="photoStatusText">📷 CLIQUEZ POUR FILMER</span>
            <input type="file" id="citPhoto" accept="image/*" capture="environment" multiple style="display:none" onchange="handleFiles(this)">
            <div id="galleryPreview"></div>
        </div>
    </div>

    <button id="sendBtn" onclick="sendToDashboard()">ENVOYER L'ALERTE</button>
    <div id="success" class="success-msg">✓ Alerte transmise avec succès !</div>
</div>

<div class="tracking-section">
    <h3 style="font-family: Orbitron; font-size: 0.9rem; color: var(--citizen-purple);">🔍 SUIVRE MES SIGNALEMENTS</h3>
    <p style="font-size: 0.8rem; color: #94a3b8;">Entrez votre numéro pour voir la liste de vos alertes.</p>
    <div style="display: flex; gap: 5px;">
        <input type="tel" id="trackPhone" placeholder="Saisir vos 9 chiffres" maxlength="9" oninput="this.value = this.value.replace(/[^0-9]/g, '')" style="margin:0;">
        <button id="trackBtn" onclick="checkMyReports()" style="background: var(--citizen-purple); border:none; color:white; padding: 0 15px; border-radius:5px; cursor:pointer;">OK</button>
    </div>
    <div id="trackResult"></div>
</div>

<script>
    // Configuration Firebase
    const firebaseConfig = { databaseURL: "https://douala-clean-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db_online = firebase.database();

    // Liste des quartiers
    const quartiersDouala = ["Akwa", "Bali", "Bonadjo", "Deido", "Bépanda", "New Bell", "Ndokoti", "Logbaba", "Village", "Bonabéri", "Bonamoussadi", "Kotto", "Logpom", "Makepe"];
    const dataList = document.getElementById('quartiers-list');
    quartiersDouala.sort().forEach(q => {
        let option = document.createElement('option');
        option.value = q;
        dataList.appendChild(option);
    });

    let photosArray = [];

    function isValidCamPhone(num) {
        return /^6[256789][0-9]{7}$/.test(num);
    }

    async function handleFiles(input) {
        const files = Array.from(input.files);
        if (files.length === 0) return;
        document.getElementById("photoStatusText").innerText = "⌛ Traitement...";
        for (let file of files) {
            if (photosArray.length >= 5) { 
                alert("Maximum 5 photos autorisées."); 
                break; 
            }
            const base64 = await compressImage(file);
            photosArray.push(base64);
        }
        renderGallery();
        document.getElementById("photoStatusText").innerText = `✅ ${photosArray.length} photo(s) prête(s)`;
    }

    function renderGallery() {
        const preview = document.getElementById("galleryPreview");
        preview.innerHTML = "";
        photosArray.forEach((src, index) => {
            const container = document.createElement("div");
            container.className = "thumb-container";
            container.innerHTML = `
                <img src="${src}" class="img-thumb">
                <div class="remove-badge" onclick="removePhoto(${index}, event)">×</div>
            `;
            preview.appendChild(container);
        });
    }

    function removePhoto(index, event) {
        event.stopPropagation();
        photosArray.splice(index, 1);
        renderGallery();
        document.getElementById("photoStatusText").innerText = photosArray.length > 0 ? `✅ ${photosArray.length} photo(s) prête(s)` : "📷 CLIQUEZ POUR FILMER";
    }

    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * (MAX_WIDTH / img.width);
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    }

    async function sendToDashboard() {
        const name = document.getElementById("citName").value.trim();
        const rawPhone = document.getElementById("citPhone").value.trim();
        const q = document.getElementById("citQuartier").value.trim();
        const loc = document.getElementById("citLoc").value.trim();
        
        // Capture des nouveaux champs
        const type = document.getElementById("issueType").value;
        const desc = document.getElementById("citDesc").value.trim();
        
        const btn = document.getElementById("sendBtn");

        if (!isValidCamPhone(rawPhone)) {
            alert("Veuillez entrer un numéro de téléphone valide (9 chiffres commençant par 6).");
            return;
        }

        if(!name || !q || !loc || !type || photosArray.length === 0) {
            alert("Veuillez remplir tous les champs obligatoires (incluant le type de problème).");
            return;
        }

        const phone = "+237" + rawPhone;
        btn.disabled = true;
        btn.innerText = "TRANSMISSION EN COURS...";

        const id = Date.now();
        const data = {
            id, name, phone, q, loc, 
            type, // Enregistré dans Firebase
            description: desc, // Enregistré dans Firebase
            photos: photosArray,
            status: "En attente",
            time: new Date().toLocaleTimeString('fr-FR'),
            date: new Date().toLocaleDateString('fr-FR')
        };

        try {
            await db_online.ref('reports/' + id).set(data);
            document.getElementById("success").style.display = "block";
            setTimeout(() => location.reload(), 2500);
        } catch (error) {
            alert("Erreur réseau : Impossible d'envoyer l'alerte.");
            btn.disabled = false;
            btn.innerText = "RÉESSAYER L'ENVOI";
        }
    }

    function checkMyReports() {
        const rawPhone = document.getElementById("trackPhone").value.trim();
        const resultDiv = document.getElementById("trackResult");
        const trackBtn = document.getElementById("trackBtn");
        
        if (rawPhone.length !== 9) {
            alert("Veuillez entrer les 9 chiffres de votre numéro.");
            return;
        }

        const finalPhone = "+237" + rawPhone;
        resultDiv.innerHTML = "<p style='font-size:0.8rem; color:var(--citizen-purple);'>⌛ Recherche...</p>";
        trackBtn.disabled = true;

        db_online.ref('reports').orderByChild('phone').equalTo(finalPhone).once('value', (snapshot) => {
            trackBtn.disabled = false;
            const data = snapshot.val();
            if(!data) {
                resultDiv.innerHTML = "<p style='color:#ff4444; font-size:0.8rem; margin-top:10px;'>Aucun signalement trouvé.</p>";
                return;
            }

            let html = "";
            Object.entries(data).reverse().forEach(([dbKey, r]) => {
                let statusClass = "status-en-attente";
                if(r.status.includes("Vu")) statusClass = "status-vu";
                if(r.status.includes("Équipe") || r.status.includes("cours") || r.status.includes("traité")) statusClass = "status-traite";

                html += `
                    <div class="track-item" id="item-${dbKey}">
                        <div style="display:flex; justify-content:space-between; align-items: flex-start;">
                            <div>
                                <b style="color:var(--citizen-purple)">${r.q}</b> - <small>${r.type || 'Signalement'}</small>
                                <br><small style="color:#94a3b8">${r.date || ''} à ${r.time}</small>
                            </div>
                            <button onclick="deleteMyReport('${dbKey}')" style="background:none; border:none; color:#ff4444; cursor:pointer; font-size:1.2rem;">🗑️</button>
                        </div>
                        <div class="status-pill ${statusClass}">${r.status}</div>
                    </div>
                `;
            });
            resultDiv.innerHTML = html;
        });
    }

    function deleteMyReport(id) {
        if(confirm("Voulez-vous vraiment supprimer ce signalement ?")) {
            db_online.ref('reports/' + id).remove().then(() => {
                const el = document.getElementById('item-' + id);
                if(el) el.remove();
            });
        }
    }
</script>
</body>
</html>
